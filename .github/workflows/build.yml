name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Module in Docker
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/workspace \
            -w /workspace \
            -e DEBIAN_FRONTEND=noninteractive \
            ubuntu:14.04 \
            bash -c "
              apt-get update && apt-get install -y software-properties-common git build-essential pkg-config python3-pip wget ca-certificates &&
              add-apt-repository ppa:ubuntu-toolchain-r/test -y &&
              apt-get update &&
              wget https://github.com/Kitware/CMake/releases/download/v3.20.6/cmake-3.20.6-linux-x86_64.tar.gz &&
              tar -xzvf cmake-3.20.6-linux-x86_64.tar.gz &&
              cp -r cmake-3.20.6-linux-x86_64/bin/* /usr/local/bin &&
              cp -r cmake-3.20.6-linux-x86_64/share/* /usr/local/share &&
              dpkg --add-architecture i386 &&
              apt-get update &&
              apt-get install -y gcc-9-multilib g++-9-multilib libcurl4-openssl-dev:i386 libssl-dev:i386 zlib1g-dev:i386 &&
              mkdir -p build && cd build &&
              cmake .. \
                -DCMAKE_C_COMPILER=gcc-9 \
                -DCMAKE_CXX_COMPILER=g++-9 \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_POLICY_VERSION_MINIMUM=3.5 \
                -DAMXX_EASY_HTTP_BUILD_TESTS=OFF &&
              make easy_http -j\$(nproc)
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easy_http_linux
          path: out/bin/Release/*.so

  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure CMake
        run: |
          mkdir build
          cd build
          cmake .. -A Win32 -DAMXX_EASY_HTTP_BUILD_TESTS=OFF

      - name: Build
        run: |
          cd build
          cmake --build . --config Release --target easy_http

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: easy_http_windows
          path: out/bin/**/*.dll

  create-release:
    needs: [build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package Release
        run: |
          mkdir -p release
          # Extract version from tag info (minus 'v')
          VERSION=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          
          # Linux Package
          mkdir -p linux_pkg
          find artifacts/easy_http_linux -name "*.so" -exec cp {} linux_pkg/ \;
          cp amxx/scripting/include/easy_http.inc linux_pkg/
          cd linux_pkg && zip -r ../release/AmxxEasyHttp-${VERSION}-linux.zip . && cd ..
          
          # Windows Package
          mkdir -p win_pkg
          find artifacts/easy_http_windows -name "*.dll" -exec cp {} win_pkg/ \;
          cp amxx/scripting/include/easy_http.inc win_pkg/
          cd win_pkg && zip -r ../release/AmxxEasyHttp-${VERSION}-windows.zip . && cd ..
          
          ls -lh release/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: release/*.zip

